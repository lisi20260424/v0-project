services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge
      - backend

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../../:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - web_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost/api
      - API_INTERNAL_BASE_URL=http://api:8080
      - NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
    expose:
      - "3000"
    networks:
      - edge
      - backend

  api:
    image: golang:1.25-alpine
    working_dir: /app/apps/api
    command: sh -c "go mod tidy && go run ./cmd/api"
    volumes:
      - ../../:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    environment:
      - GOPROXY=https://goproxy.cn,direct
    expose:
      - "8080"
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  worker:
    image: golang:1.25-alpine
    working_dir: /app/apps/worker
    command: sh -c "go mod tidy && go run ./cmd/worker"
    volumes:
      - ../../:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    environment:
      - GOPROXY=https://goproxy.cn,direct
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - backend

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pnpm_store:
  web_node_modules:
  go_mod_cache:
  go_build_cache:

networks:
  edge:
  backend:
