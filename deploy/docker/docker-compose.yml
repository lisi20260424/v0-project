version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge
      - backend

  web:
    image: node:22-alpine
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../../:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost/api
    expose:
      - "3000"
    networks:
      - edge
      - backend

  api:
    image: golang:1.23-alpine
    working_dir: /app/apps/api
    command: sh -c "go mod tidy && go run ./cmd/api"
    volumes:
      - ../../:/app
    env_file:
      - .env
    expose:
      - "8080"
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  worker:
    image: golang:1.23-alpine
    working_dir: /app/apps/worker
    command: sh -c "go mod tidy && go run ./cmd/worker"
    volumes:
      - ../../:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - backend

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  edge:
  backend:
